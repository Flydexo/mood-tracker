services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mood}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-mood_tracker}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mood} -d ${POSTGRES_DB:-mood_tracker}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      TZ: ${TZ:-UTC}
      NODE_ENV: production
      PORT: 8080
      HOST: 0.0.0.0
      LOG_LEVEL: ${LOG_LEVEL:-info}
      APP_KEY: ${APP_KEY:?APP_KEY is required}
      APP_URL: ${APP_URL:?APP_URL is required}
      DATABASE_URL: postgresql://${POSTGRES_USER:-mood}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-mood_tracker}
      API_KEY: ${API_KEY:?API_KEY is required}
      CORS_ORIGIN: ${CORS_ORIGIN:-}
    ports:
      - "${BACKEND_PORT:-3333}:8080"

volumes:
  postgres_data:
